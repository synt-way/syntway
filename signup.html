<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Syntway</title>
  <!-- link bootstrap icon cdn --> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- link bootstrap cdn for header -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- link bootstrap cdn for footer -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <!-- add header.css style file -->
  <link rel="stylesheet" href="./assets/css/maincss/header.css">
  <!-- add footer.css style file -->
  <link rel="stylesheet" href="./assets/css/maincss/footer.css">
  <!-- add signup.css style file -->
  <link rel="stylesheet" href="./assets/css/maincss/signup.css">
</head>
<body>
  <!-- Start body container coding -->
  <div id="container">
    <!-- Start Header coding -->
     <header class="navbar navbar-expand-lg navbar-light bg-light sticky-top"></header>
    <!-- End Header coding -->
    <!-- start signup coding -->
    <div class="container">
      <div class="row justify-content-center mt-3 mb-3">
      <div class="col-md-12">
        <div class="card">
          <div class="card-body">
            <h2 class="card-title text-center">Sign Up</h2>
            <form id="signupForm" method="POST" action="mailto: syntwayteam@gmail.com" class="needs-validation">
    <!-- Form fields and validation attributes -->
              <div class="form-row">
                <div class="form-group col-md-4">
                  <label for="firstName">First Name *</label>
                  <input type="text" class="form-control" id="firstName" name="firstName">
                  <div class="invalid-feedback"></div>
                </div>
                <div class="form-group col-md-4">
                  <label for="middleName">Middle Name</label>
                  <input type="text" class="form-control" id="middleName" name="middleName">
                </div>
                <div class="form-group col-md-4">
                  <label for="lastName">Last Name *</label>
                  <input type="text" class="form-control" id="lastName" name="lastName">
                  <div class="invalid-feedback"></div>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="dob">Date of Birth *</label>
                  <input type="date" class="form-control" id="dob" name="dob">
                  <div class="invalid-feedback"></div>
                </div>
                <div class="form-group col-md-6">
                  <label for="gender">Gender *</label>
                  <select class="form-control" id="gender" name="gender">
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                  </select>
                  <div class="invalid-feedback"></div>
                </div>
              </div>
              <div class="form-group">
                <label for="userId">User ID *</label>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="userIdType" id="suggestUserId" value="suggest" checked>
                  <label class="form-check-label" for="suggestUserId">Select Suggested User ID</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="userIdType" id="createUserId" value="create">
                  <label class="form-check-label" for="createUserId">Create User ID</label>
                </div>
              </div>
              <div class="form-group">
                <label for="phoneNumber">Phone Number *</label>
                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber">
                <div class="invalid-feedback"></div>
              </div>
              <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" class="form-control" id="email" name="email">
                <div class="invalid-feedback"></div>
              </div>
              <div class="form-group">
                <label for="address">Address *</label>
                <textarea class="form-control" id="address" name="address"></textarea>
                <div class="invalid-feedback"></div>
              </div>
              <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" class="form-control" id="password" name="password">
                <div class="invalid-feedback"></div>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="privacyTerms" name="privacyTerms">
                <label class="form-check-label" for="privacyTerms">
                  I agree to the <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>.
                </label>
                <div class="invalid-feedback"></div>
              </div>
              <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary">Sign Up</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    </div>
    <!-- End signup coding -->
    <!-- Start Footer coding -->
    <footer class="footer"></footer>
    <!-- End Footer coding -->
  <!-- End body container coding -->
  </div>
  
  <!-- add header.js script file -->
  <script src="./assets/js/mainjs/header.js"></script>
  <!-- add footer.js script file -->
  <script src="./assets/js/mainjs/footer.js"></script>
  <!-- Include Bootstrap JS at the end of the body , navbar script cdn -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <!-- Add jQuery library -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Add jQuery Validation plugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.3/jquery.validate.min.js"></script>
<!-- add signup.js script file -->
  <script src="./assets/js/mainjs/signup.js"></script>
</body>
</html>
